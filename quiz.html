<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz da Copa | Mini Games da Copa 26</title>
  <meta name="description" content="Responda 5 perguntas sobre futebol brasileiro e descubra seu nível." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="home.css" />
  <script src="theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* Quiz-specific overrides */
    .quiz-shell {
      max-width: 560px;
      margin: 0 auto;
    }

    .quiz-game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
      transition: background var(--transition), border-color var(--transition);
      animation: fadeSlideIn .4s ease .15s both;
    }

    .quiz-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .quiz-progress-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .quiz-score-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    .quiz-progress-track {
      height: 6px;
      background: var(--border-muted);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .quiz-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
      transition: width .5s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 0 8px var(--glow-primary);
    }

    .quiz-q-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 20px;
      transition: color var(--transition);
    }

    .quiz-options-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .quiz-opt-btn {
      text-align: left;
      border: 1.5px solid var(--border-muted);
      background: var(--card);
      color: var(--text);
      padding: 13px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .18s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quiz-opt-btn .opt-letter {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .18s;
      border: 1px solid var(--border-muted);
    }

    .quiz-opt-btn:hover:not(:disabled) {
      border-color: var(--secondary);
      background: var(--secondary-lt);
      transform: translateX(3px);
    }

    .quiz-opt-btn:hover:not(:disabled) .opt-letter {
      background: var(--secondary);
      color: #fff;
      border-color: var(--secondary);
    }

    .quiz-opt-btn.correct {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    .quiz-opt-btn.correct .opt-letter {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .quiz-opt-btn.wrong {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }

    .quiz-opt-btn.wrong .opt-letter {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .quiz-result-box {
      text-align: center;
      padding: 10px 0 4px;
    }

    .quiz-result-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 14px;
      animation: eggBounce .6s ease;
    }

    .quiz-result-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .quiz-result-level {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .quiz-streak-badge {
      background: #fff7ed;
      color: #ea580c;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1.5px solid #fdba74;
      animation: bounceIn .4s cubic-bezier(.175, .885, .32, 1.275);
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .quiz-result-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @keyframes eggBounce {
      0% {
        transform: scale(0) rotate(-20deg);
      }

      60% {
        transform: scale(1.2) rotate(5deg);
      }

      100% {
        transform: scale(1) rotate(0);
      }
    }

    /* ── SHARE CARD ─────────────────────────────────────── */
    .story-card {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1080px;
      height: 1920px;
      border-radius: 40px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #031a0c;
    }

    .sc-field-bg {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          rgba(0, 180, 60, 0.055) 0px, rgba(0, 180, 60, 0.055) 138px,
          rgba(0, 150, 45, 0.055) 138px, rgba(0, 150, 45, 0.055) 276px);
    }

    .sc-glow-tl {
      position: absolute;
      top: -240px;
      left: -240px;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 200, 80, 0.22) 0%, transparent 70%);
    }

    .sc-glow-br {
      position: absolute;
      bottom: -240px;
      right: -180px;
      width: 780px;
      height: 780px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 214, 0, 0.12) 0%, transparent 70%);
    }

    .sc-top-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 12px;
      background: linear-gradient(90deg, #00c84b, #ffd600, #00c84b);
    }

    .sc-header {
      position: absolute;
      top: 72px;
      left: 84px;
      right: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sc-brand {
      font-size: 33px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
    }

    .sc-flag-pill {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 60px;
      padding: 12px 30px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.6);
    }

    .sc-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      text-align: center;
      width: 100%;
    }

    .sc-eyebrow {
      font-size: 33px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 36px;
    }

    .sc-score-ring {
      width: 492px;
      height: 492px;
      border-radius: 50%;
      margin: 0 auto 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .sc-score-ring svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .sc-score-ring::before {
      content: '';
      position: absolute;
      inset: 30px;
      border-radius: 50%;
      background: #041609;
      z-index: 0;
    }

    .sc-score-num {
      position: relative;
      z-index: 1;
      font-size: 192px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .sc-score-total {
      position: absolute;
      bottom: 54px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.1em;
      z-index: 1;
    }

    .sc-level-badge {
      display: inline-block;
      background: #ffd600;
      color: #1a0f00;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.04em;
      padding: 24px 66px;
      border-radius: 300px;
      margin-bottom: 42px;
    }

    .sc-phrase {
      font-size: 84px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .sc-field-circle {
      position: absolute;
      bottom: 270px;
      left: 50%;
      transform: translateX(-50%);
      width: 660px;
      height: 330px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-bottom: none;
      border-radius: 330px 330px 0 0;
      pointer-events: none;
    }

    .sc-field-line {
      position: absolute;
      bottom: 264px;
      left: 84px;
      right: 84px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
    }

    .sc-divider {
      position: absolute;
      bottom: 324px;
      left: 84px;
      right: 84px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .sc-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 84px 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sc-cta {
      font-size: 36px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.06em;
      line-height: 1.5;
    }

    .sc-copa-logo {
      width: 132px;
      height: 132px;
      border-radius: 30px;
      background: rgba(0, 200, 80, 0.12);
      border: 3px solid rgba(0, 200, 80, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
  </style>
</head>

<body>
  <button id="themeToggle" onclick="toggleTheme()" aria-label="Modo escuro"></button>

  <main class="home quiz-shell">

    <section class="hero" style="margin-bottom:20px">
      <div class="kicker">🧠 Mini game</div>
      <h1>Quiz da Copa</h1>
      <p>Responda 5 perguntas sobre futebol brasileiro e descubra seu nível.</p>
      <div class="hero-actions">
        <button class="btn btn-ghost" id="btnVoltar" onclick="window.location.href='index.html'">← Voltar</button>
      </div>
    </section>

    <div class="quiz-game-card">
      <div id="quizRoot"></div>
    </div>

  </main>

  <div id="shareCard" class="story-card">

    <!-- Campo: listras de grama -->
    <div class="sc-field-bg"></div>

    <!-- Brilhos de canto -->
    <div class="sc-glow-tl"></div>
    <div class="sc-glow-br"></div>

    <!-- Faixa verde-ouro no topo -->
    <div class="sc-top-stripe"></div>

    <!-- Header -->
    <div class="sc-header">
      <span class="sc-brand">Quiz da Copa</span>
      <span class="sc-flag-pill"></span>
    </div>

    <!-- Centro: anel + score + badge -->
    <div class="sc-center">
      <div class="sc-eyebrow">Resultado</div>
      <div class="sc-score-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6" />
          <circle id="scRingCircle" cx="50" cy="50" r="45" fill="none" stroke="#00c84b" stroke-width="6"
            stroke-dasharray="0 283" stroke-linecap="round" />
        </svg>
        <div class="sc-score-num" id="storyScore">5</div>
        <div class="sc-score-total" id="scTotal">DE 5</div>
      </div>
      <div class="sc-level-badge" id="storyLevel">🏆 Especialista</div>
      <div class="sc-phrase" id="storyPhrase">Gabaritei 😎</div>
    </div>

    <!-- Decoração campo (meia-lua + linha) -->
    <div class="sc-field-circle"></div>
    <div class="sc-field-line"></div>
    <div class="sc-divider"></div>

    <!-- Rodapé -->
    <div class="sc-footer">
      <div class="sc-cta">Desafio: bate esse resultado?</div>
      <div class="sc-copa-logo">⚽</div>
    </div>

  </div>

  <script src="quiz.js"></script>
</body>

</html>
