<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz da Copa | Mini Games da Copa 26</title>
  <meta name="description" content="Responda 5 perguntas sobre futebol brasileiro e descubra seu nível."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="home.css"/>
  <script src="theme.js"></script>
  <style>
    /* Quiz-specific overrides */
    .quiz-shell {
      max-width: 560px;
      margin: 0 auto;
    }
    .quiz-game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
      transition: background var(--transition), border-color var(--transition);
      animation: fadeSlideIn .4s ease .15s both;
    }
    .quiz-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .quiz-progress-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .quiz-score-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .quiz-progress-track {
      height: 6px;
      background: var(--border-muted);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .quiz-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--glow-primary);
    }
    .quiz-q-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 20px;
      transition: color var(--transition);
    }
    .quiz-options-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .quiz-opt-btn {
      text-align: left;
      border: 1.5px solid var(--border-muted);
      background: var(--card);
      color: var(--text);
      padding: 13px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .18s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quiz-opt-btn .opt-letter {
      width: 26px; height: 26px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .18s;
      border: 1px solid var(--border-muted);
    }
    .quiz-opt-btn:hover:not(:disabled) {
      border-color: var(--secondary);
      background: var(--secondary-lt);
      transform: translateX(3px);
    }
    .quiz-opt-btn:hover:not(:disabled) .opt-letter {
      background: var(--secondary);
      color: #fff;
      border-color: var(--secondary);
    }
    .quiz-opt-btn.correct {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .quiz-opt-btn.correct .opt-letter {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .quiz-opt-btn.wrong {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }
    .quiz-opt-btn.wrong .opt-letter {
      background: var(--danger); color: #fff; border-color: var(--danger);
    }
    .quiz-result-box {
      text-align: center;
      padding: 10px 0 4px;
    }
    .quiz-result-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 14px;
      animation: eggBounce .6s ease;
    }
    .quiz-result-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .quiz-result-level {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .quiz-result-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    @keyframes eggBounce {
      0%   { transform: scale(0) rotate(-20deg); }
      60%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }
  </style>
</head>
<body>
  <button id="themeToggle" onclick="toggleTheme()" aria-label="Modo escuro"></button>

  <main class="home quiz-shell">

    <section class="hero" style="margin-bottom:20px">
      <div class="kicker">🧠 Mini game</div>
      <h1>Quiz da Copa</h1>
      <p>Responda 5 perguntas sobre futebol brasileiro e descubra seu nível.</p>
      <div class="hero-actions">
        <button class="btn btn-ghost" id="btnVoltar" onclick="window.location.href='index.html'">← Voltar</button>
      </div>
    </section>

    <div class="quiz-game-card">
      <div id="quizRoot"></div>
    </div>

  </main>

  <script src="quiz.js"></script>
</body>
</html>
